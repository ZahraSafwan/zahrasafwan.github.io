<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>

<title>Your Name | Job Title</title>

<style>
:root {
  --bg-primary:    #070b14;
  --bg-secondary:  #0d1220;
  --bg-card:       #111827;
  --bg-card-hover: #161f33;
  --accent:        #7c6af7;
  --accent-light:  #9d8fff;
  --accent-glow:   rgba(124,106,247,0.12);
  --accent-border: rgba(124,106,247,0.30);
  --text-primary:  #e8edf5;
  --text-secondary:#8899b4;
  --text-muted:    #4a5568;
  --border:        rgba(255,255,255,0.06);
  --tag-bg:        rgba(124,106,247,0.10);
  --tag-color:     #9d8fff;
  --nav-h:         64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:16px;line-height:1.7;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(7,11,20,.9);backdrop-filter:blur(16px);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.5rem,5vw,4rem);z-index:100;}
.nav-brand{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:.05em;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--text-secondary);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--accent-light);}
.nav-hamburger{display:none;background:none;border:none;color:var(--text-primary);cursor:pointer;font-size:22px;}
section{position:relative;z-index:1;}
.wrap{max-width:1100px;margin:0 auto;padding:0 clamp(1.5rem,5vw,3rem);}
.sec-pad{padding:7rem 0;}
.sec-alt{padding:7rem 0;background:var(--bg-secondary);}
.s-label{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.75rem;}
.s-label::before{content:'';width:24px;height:1px;background:var(--accent);}
.s-title{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;margin-bottom:.5rem;}
.s-sub{color:var(--text-secondary);font-size:15px;max-width:560px;margin-bottom:3rem;}
.tag{display:inline-block;background:var(--tag-bg);color:var(--tag-color);border:.5px solid var(--accent-border);padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;}
#hero{min-height:100vh;display:flex;align-items:center;padding-top:var(--nav-h);overflow:hidden;}
.glow1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,106,247,.07) 0%,transparent 70%);top:5%;right:-150px;pointer-events:none;}
.glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 70%);bottom:10%;left:-80px;pointer-events:none;}
.hero-inner{padding:4rem 0;}
.hero-hi{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.1em;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;animation:up .5s ease both;}
.hero-hi::after{content:'';width:60px;height:1px;background:var(--accent-border);}
.hero-name{font-size:clamp(2.4rem,6vw,4rem);font-weight:800;line-height:1.1;margin-bottom:.5rem;background:linear-gradient(135deg,#e8edf5,var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:up .5s .1s ease both;}
.hero-role{font-size:clamp(1rem,2.5vw,1.25rem);color:var(--text-secondary);margin-bottom:1.5rem;animation:up .5s .2s ease both;}
.hero-desc{color:var(--text-secondary);font-size:15px;line-height:1.9;max-width:580px;margin-bottom:2.5rem;animation:up .5s .3s ease both;}
.hero-stats{display:flex;gap:3rem;margin-bottom:2.5rem;flex-wrap:wrap;animation:up .5s .4s ease both;}
.stat-n{font-size:2.2rem;font-weight:800;color:var(--accent);line-height:1;font-family:'JetBrains Mono',monospace;}
.stat-l{font-size:11px;color:var(--text-muted);margin-top:4px;}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;animation:up .5s .5s ease both;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 26px;border-radius:7px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer;border:none;}
.btn-fill{background:var(--accent);color:#fff;}
.btn-fill:hover{background:var(--accent-light);transform:translateY(-2px);}
.btn-ghost{background:transparent;border:1px solid var(--accent-border);color:var(--accent-light);}
.btn-ghost:hover{background:var(--accent-glow);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
.about-text p{color:var(--text-secondary);font-size:15px;line-height:1.9;margin-bottom:1rem;}
.hcards{display:flex;flex-direction:column;gap:1rem;}
.hcard{background:var(--bg-card);border:.5px solid var(--border);border-radius:10px;padding:1.25rem;transition:all .2s;}
